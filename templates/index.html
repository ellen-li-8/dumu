<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IBBA Broker Directory — Dumu Holdings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0e0e0e;--surface:#161616;--surface2:#1e1e1e;--border:#2a2a2a;--accent:#c8f060;--accent2:#60c8f0;--text:#e8e8e0;--muted:#666;--danger:#f06060}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;min-height:100vh;display:flex;flex-direction:column}
    header{padding:20px 28px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-shrink:0}
    .logo-sup{font-size:10px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;display:block}
    .logo-title{font-family:'Fraunces',serif;font-size:24px;font-weight:600;line-height:1}
    .logo-title span{color:var(--accent)}
    .header-stats{display:flex;gap:20px;align-items:flex-end}
    .stat-pill{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
    .stat-num{font-family:'Fraunces',serif;font-size:20px;font-weight:600;color:var(--accent);line-height:1}
    .stat-label{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
    .toolbar{padding:12px 28px;display:flex;gap:8px;align-items:center;border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
    input,select{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:7px 11px;border-radius:4px;outline:none;transition:border-color .15s}
    input:focus,select:focus{border-color:var(--accent)}
    input::placeholder{color:var(--muted)}
    .search-input{width:230px}
    .btn{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:7px 14px;border-radius:4px;border:none;cursor:pointer;transition:all .15s;white-space:nowrap}
    .btn-primary{background:var(--accent);color:#0e0e0e;font-weight:500}
    .btn-primary:hover{background:#d4f570}
    .btn-primary:disabled{opacity:.4;cursor:not-allowed}
    .btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border)}
    .btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
    .btn-enrich{background:transparent;color:var(--accent2);border:1px solid var(--accent2)}
    .btn-enrich:hover{background:rgba(96,200,240,.08)}
    .btn-enrich:disabled{opacity:.4;cursor:not-allowed}
    .toggle-wrap{display:flex;align-items:center;gap:6px;margin-left:auto;color:var(--muted);font-size:11px;letter-spacing:.06em;text-transform:uppercase}
    input[type="checkbox"]{width:13px;height:13px;accent-color:var(--accent);padding:0}
    .status-bar{padding:9px 28px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;font-size:12px;flex-shrink:0}
    .status-bar.hidden{display:none}
    .status-bar.scrape{color:var(--accent2)}
    .status-bar.enrich{color:var(--accent)}
    .spinner{width:13px;height:13px;border:2px solid var(--border);border-top-color:currentColor;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
    @keyframes spin{to{transform:rotate(360deg)}}
    .main-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .table-wrap{flex:1;overflow:auto}
    table{width:100%;border-collapse:collapse}
    thead tr{border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10}
    th{padding:9px 14px;text-align:left;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);font-weight:500;white-space:nowrap}
    tbody tr.data-row{border-bottom:none;transition:background .1s;cursor:pointer}
    tbody tr.data-row:hover{background:var(--surface2)}
    tbody tr.bio-row{border-bottom:1px solid var(--border)}
    tbody tr.bio-row td{padding:0}
    .bio-inner{padding:0 14px 12px 14px;color:var(--muted);font-size:12px;line-height:1.6;max-width:900px;display:none}
    .bio-inner.open{display:block}
    td{padding:9px 14px;color:var(--text);vertical-align:middle;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    td.name-cell{font-weight:500;color:#fff;max-width:160px}
    td.email-cell a{color:var(--accent2);text-decoration:none}
    td.email-cell a:hover{text-decoration:underline}
    .expand-icon{color:var(--muted);font-size:11px;transition:transform .2s;display:inline-block;margin-right:4px}
    .expand-icon.open{transform:rotate(90deg)}
    .tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;letter-spacing:.07em;text-transform:uppercase}
    .tag-valid{background:rgba(200,240,96,.12);color:var(--accent);border:1px solid rgba(200,240,96,.25)}
    .tag-invalid{background:rgba(240,96,96,.12);color:var(--danger);border:1px solid rgba(240,96,96,.25)}
    .tag-unchecked{background:rgba(100,100,100,.15);color:var(--muted);border:1px solid var(--border)}
    .tag-in-reply{background:rgba(96,200,240,.12);color:var(--accent2);border:1px solid rgba(96,200,240,.25)}
    .empty-state{padding:60px 28px;text-align:center;color:var(--muted)}
    .empty-state h2{font-family:'Fraunces',serif;font-size:20px;font-weight:300;font-style:italic;margin-bottom:8px;color:var(--text)}
    .pagination{padding:12px 28px;display:flex;align-items:center;gap:8px;border-top:1px solid var(--border);justify-content:space-between;flex-shrink:0}
    .page-info{color:var(--muted);font-size:11px}
    .page-btns{display:flex;gap:4px}
    .page-btn{padding:4px 9px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;border-radius:3px}
    .page-btn:hover,.page-btn.active{border-color:var(--accent);color:var(--accent)}
    .page-btn:disabled{opacity:.3;cursor:default}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:26px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto}
    .modal h3{font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin-bottom:16px}
    .modal-field{margin-bottom:11px}
    .modal-field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px}
    .modal-field input,.modal-field textarea,.modal-field select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:7px 11px;border-radius:4px}
    .modal-field textarea{resize:vertical;min-height:70px}
    .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
    .progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px}
    .progress-fill{height:100%;background:var(--accent);transition:width .3s}
    .enrich-modal p{color:var(--muted);font-size:12px;line-height:1.6;margin-bottom:14px}
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-sup">Dumu Holdings / Deal Sourcing</span>
    <span class="logo-title">IBBA <span>Brokers</span></span>
  </div>
  <div class="header-stats">
    <div class="stat-pill"><span class="stat-num" id="stat-total">—</span><span class="stat-label">Total</span></div>
    <div class="stat-pill"><span class="stat-num" id="stat-email">—</span><span class="stat-label">With Email</span></div>
    <div class="stat-pill"><span class="stat-num" id="stat-enriched">—</span><span class="stat-label">Enriched</span></div>
    <div class="stat-pill"><span class="stat-num" id="stat-states">—</span><span class="stat-label">States</span></div>
  </div>
</header>

<div class="toolbar">
  <input type="text" class="search-input" placeholder="Search name, firm, email…" id="search-input"/>
  <select id="state-filter"><option value="">All States</option></select>
  <select id="specialty-filter"><option value="">All Specialties</option></select>
  <button class="btn btn-secondary" onclick="exportCSV()">↓ CSV</button>
  <label class="toggle-wrap">
    <input type="checkbox" id="email-only" onchange="loadBrokers(1)"/> Email only
  </label>
</div>

<div id="scrape-bar" class="status-bar scrape hidden">
  <div class="spinner"></div><span id="scrape-msg">Scraping…</span>
</div>
<div id="enrich-bar" class="status-bar enrich hidden">
  <div class="spinner"></div><span id="enrich-msg">Enriching…</span>
  <div style="flex:1;margin-left:12px"><div class="progress-bar"><div class="progress-fill" id="enrich-progress" style="width:0%"></div></div></div>
</div>

<div class="main-content">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:24px"></th>
          <th style="min-width:180px">Name</th>
          <th>Firm</th>
          <th>State</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Website</th>
          <th>IBBA</th>
          <th>Email Status</th>
          <th>In Reply</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="broker-table"></tbody>
    </table>
    <div id="empty-state" class="empty-state" style="display:none">
      <h2>Loading brokers…</h2>
      <p>The directory is being scraped and enriched automatically. This page will update as data comes in.</p>
    </div>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3 id="modal-title">Edit Broker</h3>
    <div class="modal-grid">
      <div class="modal-field"><label>Name</label><input type="text" id="modal-name"/></div>
      <div class="modal-field"><label>Firm</label><input type="text" id="modal-firm"/></div>
    </div>
    <div class="modal-grid">
      <div class="modal-field"><label>Email</label><input type="text" id="modal-email"/></div>
      <div class="modal-field"><label>Phone</label><input type="text" id="modal-phone"/></div>
    </div>
    <div class="modal-grid">
      <div class="modal-field"><label>State</label><input type="text" id="modal-state"/></div>
      <div class="modal-field"><label>Email Status</label>
        <select id="modal-bouncer">
          <option value="unchecked">Unchecked</option>
          <option value="valid">Valid</option>
          <option value="invalid">Invalid</option>
          <option value="risky">Risky</option>
        </select>
      </div>
    </div>
    <div class="modal-field"><label>In Reply.io</label>
      <select id="modal-reply"><option value="0">No</option><option value="1">Yes</option></select>
    </div>
    <div class="modal-field"><label>Notes</label><textarea id="modal-notes" placeholder="Notes…"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>


<script>
var currentPage=1, editingId=null, scrapeInterval=null, enrichInterval=null, searchTimer=null;

document.getElementById("search-input").addEventListener("input",function(){clearTimeout(searchTimer);searchTimer=setTimeout(function(){loadBrokers(1)},300)});
document.getElementById("state-filter").addEventListener("change",function(){loadBrokers(1)});
document.getElementById("specialty-filter").addEventListener("change",function(){loadBrokers(1)});

async function loadStats(){
  var d=await(await fetch("/api/stats")).json();
  document.getElementById("stat-total").textContent=d.total.toLocaleString();
  document.getElementById("stat-email").textContent=d.with_email.toLocaleString();
  document.getElementById("stat-enriched").textContent=d.enriched.toLocaleString();
  document.getElementById("stat-states").textContent=d.states;
}

async function loadStates(){
  var states=await(await fetch("/api/states")).json();
  var sel=document.getElementById("state-filter");
  while(sel.options.length>1) sel.remove(1);
  states.forEach(function(s){var o=document.createElement("option");o.value=s;o.textContent=s;sel.appendChild(o)});
}

async function loadSpecialties(){
  var specs=await(await fetch("/api/specialties")).json();
  var sel=document.getElementById("specialty-filter");
  while(sel.options.length>1) sel.remove(1);
  specs.forEach(function(s){var o=document.createElement("option");o.value=s;o.textContent=s;sel.appendChild(o)});
}

async function loadBrokers(page){
  page=page||1; currentPage=page;
  var search=document.getElementById("search-input").value;
  var state=document.getElementById("state-filter").value;
  var emailOnly=document.getElementById("email-only").checked;
  var specialty=document.getElementById("specialty-filter").value;
  var params=new URLSearchParams({search:search,state:state,specialty:specialty,email_only:emailOnly,page:page});
  var d=await(await fetch("/api/brokers?"+params)).json();
  var tbody=document.getElementById("broker-table");
  var empty=document.getElementById("empty-state");

  window._brokerMap={};
  d.brokers.forEach(function(b){window._brokerMap[b.id]=b});

  if(!d.brokers.length){tbody.innerHTML="";empty.style.display="block";return;}
  empty.style.display="none";

  var rows="";
  d.brokers.forEach(function(b){
    var hasBio=b.bio&&b.bio.length>0;
    var expandIcon=hasBio?'<span class="expand-icon" id="ei-'+b.id+'">▶</span>':'';
    var specTags='';
    if(b.specialties){
      b.specialties.split(',').slice(0,3).forEach(function(s){
        s=s.trim();
        if(s) specTags+='<span style="display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;background:rgba(200,240,96,.1);color:var(--accent);border:1px solid rgba(200,240,96,.2);margin:1px 2px 1px 0;white-space:nowrap">'+esc(s)+'</span>';
      });
      if(b.specialties.split(',').length>3) specTags+='<span style="font-size:9px;color:var(--muted)">+'+( b.specialties.split(',').length-3)+' more</span>';
    }
    var emailCell=b.email?'<a href="mailto:'+esc(b.email)+'">'+esc(b.email)+'</a>':'<span style="color:var(--muted)">—</span>';
    var phoneCell=b.phone?'<a href="tel:'+esc(b.phone)+'" style="color:var(--text);text-decoration:none">'+esc(b.phone)+'</a>':'<span style="color:var(--muted)">—</span>';
    var webCell=b.website?'<a href="'+esc(b.website)+'" target="_blank" style="color:var(--accent2)">↗</a>':'<span style="color:var(--muted)">—</span>';
    var ibbaCell=b.profile_url?'<a href="'+esc(b.profile_url)+'" target="_blank" style="color:var(--accent2);font-size:11px">↗</a>':'<span style="color:var(--muted)">—</span>';
    var bouncer='<span class="tag tag-'+(b.bouncer_status||"unchecked")+'">'+(b.bouncer_status||"—")+'</span>';
    var reply=b.in_reply?'<span class="tag tag-in-reply">Yes</span>':'<span style="color:var(--muted)">—</span>';
    var editBtn='<button class="btn btn-secondary" style="padding:3px 9px;font-size:10px" onclick="event.stopPropagation();openEdit('+b.id+')">Edit</button>';
    var rowClick=hasBio?'onclick="toggleBio('+b.id+')"':'';

    rows+='<tr class="data-row" '+rowClick+'>'
      +'<td style="padding:9px 6px 9px 14px">'+expandIcon+'</td>'
      +'<td class="name-cell" title="'+esc(b.name)+'" style="max-width:200px;white-space:normal">'+esc(b.name)+(specTags?'<br><span style=\"line-height:1.8\">'+specTags+'</span>':'')+'</td>'
      +'<td title="'+esc(b.firm)+'">'+(esc(b.firm)||'<span style="color:var(--muted)">—</span>')+'</td>'
      +'<td>'+esc(b.state)+'</td>'
      +'<td class="email-cell">'+emailCell+'</td>'
      +'<td>'+phoneCell+'</td>'
      +'<td>'+webCell+'</td>'
      +'<td>'+ibbaCell+'</td>'
      +'<td>'+bouncer+'</td>'
      +'<td>'+reply+'</td>'
      +'<td>'+editBtn+'</td>'
      +'</tr>';

    // Bio expansion row — always present, hidden until toggled
    rows+='<tr class="bio-row" id="bio-row-'+b.id+'">'
      +'<td colspan="11"><div class="bio-inner" id="bio-'+b.id+'">'+esc(b.bio||"")+'</div></td>'
      +'</tr>';
  });
  tbody.innerHTML=rows;
  renderPagination(d.page,d.pages,d.total);
}

function toggleBio(id){
  var inner=document.getElementById("bio-"+id);
  var icon=document.getElementById("ei-"+id);
  if(!inner) return;
  var isOpen=inner.classList.contains("open");
  inner.classList.toggle("open",!isOpen);
  if(icon) icon.classList.toggle("open",!isOpen);
}

function renderPagination(page,pages,total){
  var el=document.getElementById("pagination");
  if(pages<=1){el.innerHTML="";return;}
  var start=(page-1)*50+1, end=Math.min(page*50,total);
  var nums="";
  for(var p=Math.max(1,page-3);p<=Math.min(pages,page+3);p++){
    nums+='<button class="page-btn'+(p===page?" active":"")+'" onclick="loadBrokers('+p+')">'+p+'</button>';
  }
  el.innerHTML='<span class="page-info">Showing '+start+'–'+end+' of '+total.toLocaleString()+'</span>'
    +'<div class="page-btns">'
    +'<button class="page-btn" onclick="loadBrokers('+(page-1)+')" '+(page===1?"disabled":"")+'>←</button>'
    +nums
    +'<button class="page-btn" onclick="loadBrokers('+(page+1)+')" '+(page===pages?"disabled":"")+'>→</button>'
    +'</div>';
}

// Auto-poll scrape and enrich status — no buttons needed
function pollAutoStatus(){
  setInterval(async function(){
    try {
      var sd=await(await fetch("/api/scrape/status")).json();
      var scrapeBar=document.getElementById("scrape-bar");
      if(sd.running){
        scrapeBar.classList.remove("hidden");
        document.getElementById("scrape-msg").textContent=sd.message;
        loadBrokers(currentPage); loadStats();
      } else if(!scrapeBar.classList.contains("hidden") && !sd.running){
        document.getElementById("scrape-msg").textContent=sd.message;
        loadBrokers(currentPage); loadStats(); loadStates();
        setTimeout(function(){scrapeBar.classList.add("hidden")},6000);
      }
    } catch(e){}
    try {
      var ed=await(await fetch("/api/enrich/status")).json();
      var enrichBar=document.getElementById("enrich-bar");
      if(ed.running){
        enrichBar.classList.remove("hidden");
        document.getElementById("enrich-msg").textContent=ed.message;
        if(ed.total>0) document.getElementById("enrich-progress").style.width=Math.round(ed.done/ed.total*100)+"%";
        if(ed.done%10===0) { loadBrokers(currentPage); loadStats(); }
      } else if(!enrichBar.classList.contains("hidden") && !ed.running){
        document.getElementById("enrich-msg").textContent=ed.message;
        document.getElementById("enrich-progress").style.width="100%";
        loadBrokers(currentPage); loadStats(); loadSpecialties();
        setTimeout(function(){
          enrichBar.classList.add("hidden");
          document.getElementById("enrich-progress").style.width="0%";
        },6000);
      }
    } catch(e){}
  },3000);
}
pollAutoStatus();

function exportCSV(){
  var state=document.getElementById("state-filter").value;
  var specialty=document.getElementById("specialty-filter").value;
  var search=document.getElementById("search-input").value;
  var emailOnly=document.getElementById("email-only").checked;
  var params=new URLSearchParams({state:state,specialty:specialty,search:search,email_only:emailOnly});
  window.location.href="/api/export?"+params;
}

function openEdit(id){
  var b=window._brokerMap[id];
  if(!b) return;
  editingId=b.id;
  document.getElementById("modal-title").textContent=b.name||"Edit Broker";
  document.getElementById("modal-name").value=b.name||"";
  document.getElementById("modal-firm").value=b.firm||"";
  document.getElementById("modal-email").value=b.email||"";
  document.getElementById("modal-phone").value=b.phone||"";
  document.getElementById("modal-state").value=b.state||"";
  document.getElementById("modal-bouncer").value=b.bouncer_status||"unchecked";
  document.getElementById("modal-reply").value=b.in_reply?"1":"0";
  document.getElementById("modal-notes").value=b.notes||"";
  document.getElementById("edit-modal").classList.add("open");
}

function closeModal(){document.getElementById("edit-modal").classList.remove("open");editingId=null}

async function saveEdit(){
  if(!editingId) return;
  await fetch("/api/brokers/"+editingId,{
    method:"PATCH",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:document.getElementById("modal-name").value,
      firm:document.getElementById("modal-firm").value,
      email:document.getElementById("modal-email").value,
      phone:document.getElementById("modal-phone").value,
      state:document.getElementById("modal-state").value,
      bouncer_status:document.getElementById("modal-bouncer").value,
      in_reply:document.getElementById("modal-reply").value==="1",
      notes:document.getElementById("modal-notes").value
    })
  });
  closeModal(); loadBrokers(currentPage);
}

function esc(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

loadStats(); loadStates(); loadSpecialties(); loadBrokers(1);
</script>
</body>
</html>
